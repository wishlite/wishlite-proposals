<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>永續禮品提案｜Wishlite 韻手作</title>
<meta name="description" content="把送禮，變成一段永續的對話。填寫需求，我們幫你搭配最適合的材料與敘事。" />
<style>
  :root{
    --bg:#F5F2EA; --ink:#2F2A24; --sub:#7A6F61;
    --brown:#A67C52; --green:#7D8F72; --line:#E6E0D2; --card:#FDFBF5;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);
    font-family:"PingFang TC","Noto Serif TC","Noto Sans TC",serif;
    -webkit-font-smoothing:antialiased;line-height:1.7}
  .wrap{max-width:720px;margin:0 auto;padding:56px 24px 80px}
  .hero{text-align:center;margin-bottom:40px}
  .hero .kicker{font-size:13px;letter-spacing:3px;color:var(--brown);
    text-transform:uppercase;margin-bottom:16px;font-weight:500}
  .hero h1{font-size:30px;font-weight:600;line-height:1.4;margin-bottom:12px;letter-spacing:1px}
  .hero p{font-size:15px;color:var(--sub);line-height:1.9}
  .divider{width:48px;height:1px;background:var(--brown);margin:28px auto}

  .card{background:var(--card);border:1px solid var(--line);border-radius:4px;
    padding:36px 28px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .field{margin-bottom:24px}
  .field label{display:block;font-size:14px;font-weight:500;margin-bottom:8px;color:var(--ink)}
  .field .hint{font-size:12px;color:var(--sub);margin-bottom:8px;display:block}
  .req{color:#B4543A;margin-left:3px}

  input[type=text],input[type=email],input[type=tel],input[type=date],
  input[type=number],select,textarea{
    width:100%;padding:12px 14px;border:1px solid var(--line);
    background:#fff;border-radius:3px;font-size:15px;color:var(--ink);
    font-family:inherit;transition:border-color .15s}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brown)}
  textarea{resize:vertical;min-height:90px;line-height:1.7}

  .opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .opts.one{grid-template-columns:1fr}
  .opt{display:flex;align-items:flex-start;padding:12px 14px;
    background:#fff;border:1px solid var(--line);border-radius:3px;
    cursor:pointer;transition:all .15s;font-size:14.5px}
  .opt:hover{border-color:var(--brown)}
  .opt input{margin-right:10px;margin-top:3px;accent-color:var(--brown)}
  .opt.active{background:#FAF6EA;border-color:var(--brown)}

  .btn{width:100%;padding:16px;background:var(--brown);color:#fff;
    border:none;border-radius:3px;font-size:16px;letter-spacing:2px;
    font-family:inherit;cursor:pointer;transition:background .2s;margin-top:12px}
  .btn:hover{background:#8F683D}
  .btn:disabled{background:#C9B89A;cursor:not-allowed}

  .ok,.err{margin-top:20px;padding:18px;border-radius:3px;
    font-size:14.5px;line-height:1.8;display:none}
  .ok{background:#EFF2EC;border-left:3px solid var(--green);color:#3E4938}
  .err{background:#FBEFE9;border-left:3px solid #B4543A;color:#6B3420}

  .footer-note{text-align:center;margin-top:32px;font-size:12.5px;color:var(--sub)}
  .footer-brand{text-align:center;margin-top:48px;padding-top:24px;
    border-top:1px solid var(--line);color:var(--sub);font-size:12px;letter-spacing:2px}

  @media (max-width:560px){
    .wrap{padding:32px 16px 60px}
    .hero h1{font-size:24px}
    .card{padding:28px 20px}
    .opts{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="kicker">Sustainable Gift · Wishlite</div>
    <h1>永續禮品提案</h1>
    <div class="divider"></div>
    <p>把送禮，變成一段永續的對話。<br/>
       從材料到故事，我們幫你搭配最適合的禮品方向。<br/>
       不用先想很完整，我們會依你的需求整理。</p>
  </div>

  <form class="card" id="form" novalidate>
    <div class="field">
      <label>公司 / 組織名稱<span class="req">*</span></label>
      <input type="text" name="company" required placeholder="例：○○ 股份有限公司" />
    </div>

    <div class="field">
      <label>聯絡人姓名<span class="req">*</span></label>
      <input type="text" name="name" required />
    </div>

    <div class="field">
      <label>Email<span class="req">*</span></label>
      <input type="email" name="email" required placeholder="we@company.com" />
    </div>

    <div class="field">
      <label>電話</label>
      <input type="tel" name="phone" placeholder="市話 / 手機皆可" />
    </div>

    <div class="field">
      <label>LINE ID（方便後續聯繫）</label>
      <input type="text" name="lineId" />
    </div>

    <div class="field">
      <label>禮品類型 / 方向<span class="req">*</span></label>
      <span class="hint">想先了解也沒關係，我們會依情境推薦</span>
      <div class="opts">
        <label class="opt"><input type="radio" name="giftType" value="擴香石" required /><span>擴香石</span></label>
        <label class="opt"><input type="radio" name="giftType" value="咖啡渣環保筆" /><span>咖啡渣環保筆</span></label>
        <label class="opt"><input type="radio" name="giftType" value="再生塑料系列" /><span>再生塑料系列</span></label>
        <label class="opt"><input type="radio" name="giftType" value="牡蠣殼系列" /><span>牡蠣殼系列</span></label>
        <label class="opt"><input type="radio" name="giftType" value="組合禮盒" /><span>組合禮盒</span></label>
        <label class="opt"><input type="radio" name="giftType" value="想先了解" /><span>想先了解 / 其他</span></label>
      </div>
    </div>

    <div class="field">
      <label>預計數量<span class="req">*</span></label>
      <input type="number" name="quantity" required min="1" placeholder="例：100" />
    </div>

    <div class="field">
      <label>使用情境（可複選）</label>
      <span class="hint">我們會依情境搭配最貼近的敘事</span>
      <div class="opts">
        <label class="opt"><input type="checkbox" name="occasions" value="企業年節禮" /><span>企業年節禮</span></label>
        <label class="opt"><input type="checkbox" name="occasions" value="週年紀念" /><span>週年紀念</span></label>
        <label class="opt"><input type="checkbox" name="occasions" value="員工凝聚" /><span>員工凝聚</span></label>
        <label class="opt"><input type="checkbox" name="occasions" value="客戶致贈" /><span>客戶致贈</span></label>
        <label class="opt"><input type="checkbox" name="occasions" value="活動贈品" /><span>活動贈品</span></label>
        <label class="opt"><input type="checkbox" name="occasions" value="其他" /><span>其他 / 想先了解</span></label>
      </div>
    </div>

    <div class="field">
      <label>預算範圍（單件）</label>
      <div class="opts one">
        <label class="opt"><input type="radio" name="budget" value="under200" /><span>NT$ 200 以下 / 件</span></label>
        <label class="opt"><input type="radio" name="budget" value="200-500" /><span>NT$ 200–500 / 件</span></label>
        <label class="opt"><input type="radio" name="budget" value="500-1000" /><span>NT$ 500–1,000 / 件</span></label>
        <label class="opt"><input type="radio" name="budget" value="1000-2000" /><span>NT$ 1,000–2,000 / 件</span></label>
        <label class="opt"><input type="radio" name="budget" value="over2000" /><span>NT$ 2,000 以上 / 件</span></label>
      </div>
    </div>

    <div class="field">
      <label>預計交付日期</label>
      <input type="date" name="deliveryDate" />
    </div>

    <div class="field">
      <label>是否需要 LOGO 客製 / 加工？</label>
      <span class="hint">擴香石 3D 建模・再生塑料雷雕・貼紙等工法</span>
      <div class="opts">
        <label class="opt"><input type="radio" name="logoCustom" value="yes" /><span>需要</span></label>
        <label class="opt"><input type="radio" name="logoCustom" value="no" /><span>不需要</span></label>
        <label class="opt"><input type="radio" name="logoCustom" value="maybe" /><span>想先了解</span></label>
      </div>
    </div>

    <div class="field">
      <label>是否需要活動紀錄 / 成果文件？</label>
      <div class="opts">
        <label class="opt"><input type="radio" name="esgReport" value="yes" /><span>需要</span></label>
        <label class="opt"><input type="radio" name="esgReport" value="no" /><span>不需要</span></label>
        <label class="opt"><input type="radio" name="esgReport" value="maybe" /><span>想先了解</span></label>
      </div>
    </div>

    <div class="field">
      <label>其他需求 / 想傳達的故事</label>
      <textarea name="notes" placeholder="例：想讓客戶在收到禮品時，感受到品牌對永續的態度⋯⋯（不用一次寫完整）"></textarea>
    </div>

    <input type="hidden" name="form_source" value="line" />
    <input type="hidden" name="source" value="LINE OA" />

    <button type="submit" class="btn" id="btn">送出需求</button>

    <div class="ok" id="ok">
      🌿 已收到你的需求。<br/>
      我們會依填寫內容整理最適合的禮品方向，透過 Email 與你聯繫。<br/>
      期待和你一起，把送禮變成一段永續的對話。
    </div>
    <div class="err" id="err">
      送出失敗，請稍後再試，或直接 LINE 我們：@728zvmqz
    </div>
  </form>

  <div class="footer-note">你的資料僅用於本次需求評估，不會對外分享。</div>
  <div class="footer-brand">WISHLITE · 韻手作永續</div>
</div>

<script>
const WEBHOOK = 'https://wishlite-n8n.zeabur.app/webhook/gift-inquiry';

document.querySelectorAll('.opt input').forEach(inp => {
  const sync = () => {
    if (inp.type === 'radio') {
      document.querySelectorAll(`input[name="${inp.name}"]`).forEach(x =>
        x.closest('.opt').classList.toggle('active', x.checked));
    } else {
      inp.closest('.opt').classList.toggle('active', inp.checked);
    }
  };
  inp.addEventListener('change', sync);
});

const form = document.getElementById('form');
const btn = document.getElementById('btn');
const ok = document.getElementById('ok');
const err = document.getElementById('err');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  ok.style.display = err.style.display = 'none';
  btn.disabled = true; btn.textContent = '送出中…';

  const fd = new FormData(form);
  const data = {};
  for (const [k, v] of fd.entries()) {
    if (k === 'occasions') (data.occasions = data.occasions || []).push(v);
    else data[k] = v;
  }

  try {
    const r = await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    form.style.display = 'none';
    ok.style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (ex) {
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = '送出需求';
  }
});
</script>
</body>
</html>
